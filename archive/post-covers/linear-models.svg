<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#032122"/>
      <stop offset="55%" stop-color="#0c3a36"/>
      <stop offset="100%" stop-color="#0d6b5e"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.78" cy="0.42" r="0.4">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fitLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fda4af" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <rect width="1200" height="480" fill="url(#glow)"/>

  <!-- Axes (subtle) -->
  <g stroke="#5eead4" stroke-opacity="0.30" stroke-width="1.4">
    <line x1="500" y1="400" x2="1140" y2="400"/>
    <line x1="500" y1="400" x2="500" y2="80"/>
  </g>

  <!-- Best-fit line with shadow -->
  <line x1="510" y1="385" x2="1130" y2="115" stroke="url(#fitLine)" stroke-width="4" stroke-linecap="round" opacity="0.95"/>

  <!-- Scatter -->
  <g fill="#5eead4">
    <circle cx="560" cy="372" r="5"/>
    <circle cx="605" cy="358" r="5"/>
    <circle cx="640" cy="340" r="5"/>
    <circle cx="680" cy="335" r="5"/>
    <circle cx="715" cy="310" r="5"/>
    <circle cx="755" cy="295" r="5"/>
    <circle cx="795" cy="280" r="5"/>
    <circle cx="835" cy="258" r="5"/>
    <circle cx="880" cy="245" r="5"/>
    <circle cx="925" cy="220" r="5"/>
    <circle cx="965" cy="200" r="5"/>
    <circle cx="1005" cy="180" r="5"/>
    <circle cx="1050" cy="155" r="5"/>
    <circle cx="1095" cy="135" r="5"/>
  </g>

  <!-- Residual hints — dashed verticals from a few points to line -->
  <g stroke="#fda4af" stroke-opacity="0.45" stroke-width="1.2" stroke-dasharray="3 3">
    <line x1="605" y1="358" x2="605" y2="335"/>
    <line x1="795" y1="280" x2="795" y2="259"/>
    <line x1="965" y1="200" x2="965" y2="186"/>
  </g>

  <!-- Geometric "projection" motif on left side: column-space arrow + ortho -->
  <g transform="translate(220 240)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Column space arrow -->
    <path d="M 0 0 L 180 -90" stroke="#5eead4" stroke-opacity="0.85" marker-end="url(#triCs)"/>
    <!-- Orthogonal projection -->
    <path d="M 0 0 L 80 110" stroke="#fda4af" stroke-opacity="0.75" marker-end="url(#triRes)"/>
    <!-- y vector -->
    <path d="M 0 0 L 180 -90 M 180 -90 L 195 95 L 80 110" stroke="#a7f3d0" stroke-opacity="0.45" stroke-dasharray="4 4"/>
    <!-- Right angle marker -->
    <path d="M 168 -77 L 156 -90 L 142 -82" stroke="#5eead4" stroke-opacity="0.6" stroke-width="1.3"/>
  </g>

  <defs>
    <marker id="triCs" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5eead4" fill-opacity="0.9"/>
    </marker>
    <marker id="triRes" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#fda4af" fill-opacity="0.85"/>
    </marker>
  </defs>
</svg>

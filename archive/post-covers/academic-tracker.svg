<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04201a"/>
      <stop offset="55%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.75" cy="0.42" r="0.45">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kpi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="funnel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <rect width="1200" height="480" fill="url(#glow)"/>

  <!-- KPI tile row, left side -->
  <g transform="translate(80 100)">
    <g>
      <rect x="0" y="0" width="160" height="92" rx="12" fill="#0f3a30" stroke="#34d399" stroke-width="1.4" stroke-opacity="0.7"/>
      <text x="18" y="34" font-family="Georgia, serif" font-size="14" fill="#a7f3d0" fill-opacity="0.85">Tracked</text>
      <text x="18" y="74" font-family="Georgia, serif" font-size="38" fill="#ecfdf5" font-weight="700">42</text>
    </g>
    <g transform="translate(180 0)">
      <rect x="0" y="0" width="160" height="92" rx="12" fill="#0f3a30" stroke="#34d399" stroke-width="1.4" stroke-opacity="0.7"/>
      <text x="18" y="34" font-family="Georgia, serif" font-size="14" fill="#a7f3d0" fill-opacity="0.85">Applied</text>
      <text x="18" y="74" font-family="Georgia, serif" font-size="38" fill="#ecfdf5" font-weight="700">28</text>
    </g>
    <g transform="translate(0 110)">
      <rect x="0" y="0" width="160" height="92" rx="12" fill="#0f3a30" stroke="#34d399" stroke-width="1.4" stroke-opacity="0.7"/>
      <text x="18" y="34" font-family="Georgia, serif" font-size="14" fill="#a7f3d0" fill-opacity="0.85">Interview</text>
      <text x="18" y="74" font-family="Georgia, serif" font-size="38" fill="#ecfdf5" font-weight="700">7</text>
    </g>
    <g transform="translate(180 110)">
      <rect x="0" y="0" width="160" height="92" rx="12" fill="#0f3a30" stroke="#fbbf24" stroke-width="1.6" stroke-opacity="0.85"/>
      <text x="18" y="34" font-family="Georgia, serif" font-size="14" fill="#fde68a" fill-opacity="0.95">Next Deadline</text>
      <text x="18" y="74" font-family="Georgia, serif" font-size="32" fill="#fde68a" font-weight="700">3d</text>
    </g>
  </g>

  <!-- Funnel chart, right side -->
  <g transform="translate(600 110)">
    <rect x="0" y="0" width="280" height="32" rx="6" fill="url(#funnel)" opacity="0.95"/>
    <text x="14" y="22" font-family="Georgia, serif" font-size="14" fill="#022c22" font-weight="700">Saved 42</text>

    <rect x="30" y="48" width="220" height="32" rx="6" fill="url(#funnel)" opacity="0.85"/>
    <text x="44" y="70" font-family="Georgia, serif" font-size="14" fill="#022c22" font-weight="700">Applied 28</text>

    <rect x="70" y="96" width="140" height="32" rx="6" fill="url(#funnel)" opacity="0.7"/>
    <text x="84" y="118" font-family="Georgia, serif" font-size="14" fill="#022c22" font-weight="700">Interview 7</text>

    <rect x="105" y="144" width="70" height="32" rx="6" fill="url(#funnel)" opacity="0.55"/>
    <text x="116" y="166" font-family="Georgia, serif" font-size="14" fill="#022c22" font-weight="700">Offer 2</text>
  </g>

  <!-- Sparkline / urgency indicators -->
  <g transform="translate(950 110)">
    <text x="0" y="14" font-family="Georgia, serif" font-size="14" fill="#a7f3d0">Urgency</text>
    <g fill="#fbbf24">
      <circle cx="20" cy="48" r="6"/>
      <circle cx="46" cy="48" r="6" opacity="0.85"/>
      <circle cx="72" cy="48" r="6" opacity="0.7"/>
    </g>
    <g fill="#34d399">
      <circle cx="20" cy="78" r="6"/>
      <circle cx="46" cy="78" r="6" opacity="0.85"/>
      <circle cx="72" cy="78" r="6" opacity="0.7"/>
      <circle cx="98" cy="78" r="6" opacity="0.55"/>
      <circle cx="124" cy="78" r="6" opacity="0.4"/>
    </g>
    <g fill="#dc2626">
      <circle cx="20" cy="108" r="6"/>
      <circle cx="46" cy="108" r="6" opacity="0.7"/>
    </g>
    <text x="0" y="148" font-family="Georgia, serif" font-size="12" fill="#a7f3d0" fill-opacity="0.7">red · yellow · green</text>
  </g>

  <!-- Today task badge -->
  <g transform="translate(160 360)">
    <rect x="0" y="0" width="220" height="56" rx="14" fill="#fbbf24"/>
    <text x="20" y="36" font-family="Georgia, serif" font-size="22" fill="#451a03" font-weight="700">Today: 3 tasks</text>
  </g>

  <!-- Connector line from KPI to funnel -->
  <line x1="400" y1="200" x2="590" y2="200" stroke="#34d399" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="4 4"/>
</svg>

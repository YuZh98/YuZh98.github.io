<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1b14"/>
      <stop offset="55%" stop-color="#3f3f1a"/>
      <stop offset="100%" stop-color="#854d0e"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.68" cy="0.45" r="0.45">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="flowArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <rect width="1200" height="480" fill="url(#glow)"/>

  <!-- Background ghost stack of messy pages (before) -->
  <g transform="translate(220 240) rotate(-12)" opacity="0.35">
    <rect x="-120" y="-100" width="180" height="220" rx="6" fill="#1f1f1f" stroke="#fde68a" stroke-width="1.2" stroke-opacity="0.5"/>
    <g stroke="#fde68a" stroke-opacity="0.4" stroke-width="1">
      <line x1="-100" y1="-70" x2="40" y2="-70"/>
      <line x1="-100" y1="-50" x2="20" y2="-50"/>
      <line x1="-100" y1="-30" x2="40" y2="-30"/>
      <line x1="-100" y1="-10" x2="10" y2="-10"/>
      <line x1="-100" y1="10" x2="40" y2="10"/>
      <line x1="-100" y1="30" x2="-10" y2="30"/>
      <line x1="-100" y1="50" x2="30" y2="50"/>
    </g>
  </g>
  <g transform="translate(190 230) rotate(-6)" opacity="0.5">
    <rect x="-110" y="-105" width="180" height="220" rx="6" fill="#2a2a2a" stroke="#fde68a" stroke-width="1.2" stroke-opacity="0.6"/>
  </g>

  <!-- Foreground: "before" messy paper -->
  <g transform="translate(190 240)">
    <rect x="-100" y="-110" width="200" height="240" rx="8" fill="url(#paperGrad)" opacity="0.96"/>
    <g stroke="#854d0e" stroke-width="1.4" stroke-opacity="0.7">
      <line x1="-80" y1="-78" x2="80" y2="-78"/>
      <line x1="-80" y1="-58" x2="40" y2="-58"/>
      <line x1="-80" y1="-38" x2="70" y2="-38"/>
      <line x1="-80" y1="-18" x2="20" y2="-18"/>
      <line x1="-80" y1="2" x2="80" y2="2"/>
      <line x1="-80" y1="22" x2="50" y2="22"/>
      <line x1="-80" y1="42" x2="80" y2="42"/>
      <line x1="-80" y1="62" x2="30" y2="62"/>
      <line x1="-80" y1="82" x2="80" y2="82"/>
    </g>
    <!-- Red highlight overlays simulating clutter -->
    <rect x="-78" y="-62" width="100" height="6" fill="#dc2626" fill-opacity="0.55"/>
    <rect x="-78" y="-22" width="60" height="6" fill="#dc2626" fill-opacity="0.55"/>
    <rect x="-78" y="58" width="80" height="6" fill="#dc2626" fill-opacity="0.55"/>
    <text x="0" y="115" font-family="Georgia, serif" font-size="18" fill="#854d0e" text-anchor="middle" font-style="italic">.tex · .aux · .bbl · .log</text>
  </g>

  <!-- Arrow / pipeline -->
  <g transform="translate(540 240)">
    <path d="M 0 0 L 110 0" stroke="url(#flowArrow)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 100 -10 L 120 0 L 100 10 Z" fill="#fde047"/>
    <text x="60" y="-18" font-family="Georgia, serif" font-size="20" fill="#fde047" text-anchor="middle" font-style="italic">clean</text>
    <text x="60" y="32" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#fbbf24" fill-opacity="0.7" text-anchor="middle">--compile --guide</text>
  </g>

  <!-- After: clean arXiv zip -->
  <g transform="translate(870 240)">
    <rect x="-100" y="-110" width="200" height="240" rx="10" fill="#0f172a" stroke="#fde047" stroke-width="2.2"/>
    <!-- Zip "teeth" -->
    <line x1="0" y1="-110" x2="0" y2="-78" stroke="#fde047" stroke-width="2"/>
    <g fill="#fde047">
      <rect x="-6" y="-78" width="12" height="4"/>
      <rect x="-6" y="-66" width="12" height="4"/>
    </g>
    <!-- Lock / handle -->
    <circle cx="0" cy="-50" r="9" fill="#fde047" opacity="0.95"/>
    <!-- Clean file lines inside -->
    <g stroke="#fde68a" stroke-width="1.4" stroke-opacity="0.85">
      <line x1="-72" y1="-20" x2="72" y2="-20"/>
      <line x1="-72" y1="0" x2="50" y2="0"/>
      <line x1="-72" y1="20" x2="72" y2="20"/>
      <line x1="-72" y1="40" x2="40" y2="40"/>
      <line x1="-72" y1="60" x2="72" y2="60"/>
    </g>
    <text x="0" y="105" font-family="Georgia, serif" font-size="20" fill="#fde047" text-anchor="middle" font-weight="600">arXiv-ready .zip</text>
  </g>

  <!-- Pre-flight check marks badge top right -->
  <g transform="translate(1090 90)">
    <circle r="28" fill="#16a34a" opacity="0.85"/>
    <path d="M -10 0 L -2 8 L 12 -8" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Brownian motion sample path -->
  <path d="M 60 380 L 100 360 L 130 410 L 165 380 L 200 420 L 230 390 L 265 450 L 300 410 L 335 460 L 370 420 L 405 390 L 440 440 L 475 400 L 510 470 L 545 430 L 580 380 L 615 420 L 650 360 L 685 410 L 720 350 L 755 400 L 790 320 L 825 360 L 860 290 L 895 330 L 930 260 L 965 310 L 1000 240 L 1035 290 L 1070 220 L 1105 270 L 1140 200"
        fill="none" stroke="url(#path)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Axis hint -->
  <line x1="60" y1="540" x2="1140" y2="540" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1090" y="565" font-family="Georgia, serif" font-size="18" fill="#ffffff" fill-opacity="0.5" font-style="italic">t</text>

  <!-- Title -->
  <text x="60" y="140" font-family="Georgia, serif" font-size="64" font-weight="600" fill="#f8fafc">Stochastic Process</text>
  <text x="60" y="180" font-family="Georgia, serif" font-size="22" fill="#22d3ee" font-style="italic">Markov chains · Brownian motion · martingales</text>
</svg>

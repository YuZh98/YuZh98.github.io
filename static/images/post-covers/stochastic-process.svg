    <rect x="220" y="80" width="56" height="56" rx="6"/>
    <rect x="200" y="220" width="56" height="56" rx="6"/>
    <path d="M 176 148 L 220 108" marker-end="url(#arrowhead)"/>
    <path d="M 176 148 L 200 240" marker-end="url(#arrowhead)"/>
    <path d="M 276 108 L 252 220" marker-end="url(#arrowhead)"/>
  </g>

  <path d="M 80 320 C 130 305 150 345 180 332 C 215 318 235 358 265 340 C 300 318 320 365 350 345 C 385 320 405 372 440 348 C 475 322 500 380 532 348 C 568 312 590 372 622 340 C 656 306 678 358 712 320 C 748 280 770 332 802 290 C 836 246 858 296 890 252 C 924 206 946 254 978 208 C 1010 162 1034 208 1070 168 C 1100 134 1118 168 1140 142"
        fill="none" stroke="url(#path)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <g fill="#a5f3fc">
    <circle cx="1075" cy="170" r="3" opacity="0.9"/>
    <circle cx="1098" cy="148" r="2.5" opacity="0.8"/>
    <circle cx="1055" cy="186" r="2" opacity="0.7"/>
    <circle cx="1120" cy="138" r="2.5" opacity="0.85"/>
    <circle cx="1040" cy="195" r="2" opacity="0.6"/>
    <circle cx="1140" cy="125" r="3" opacity="0.95"/>
  </g>

  <g fill="#22d3ee" filter="url(#blur)" opacity="0.55">
    <circle cx="530" cy="345" r="2.5"/>
    <circle cx="610" cy="330" r="2"/>
    <circle cx="700" cy="310" r="2.5"/>
    <circle cx="800" cy="280" r="2"/>

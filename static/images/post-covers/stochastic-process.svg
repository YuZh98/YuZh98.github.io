    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#67e8f9" fill-opacity="0.4"/>
    </marker>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <rect width="1200" height="480" fill="url(#glow)"/>

  <g opacity="0.22" stroke="#67e8f9" stroke-width="1.4" fill="none">

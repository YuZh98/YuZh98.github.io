  <line x1="60" y1="420" x2="1140" y2="420" stroke="#67e8f9" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="60" y1="420" x2="60" y2="60" stroke="#67e8f9" stroke-opacity="0.18" stroke-width="1"/>

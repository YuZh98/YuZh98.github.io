<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Axes -->
  <g stroke="#5eead4" stroke-opacity="0.4" stroke-width="1.5">
    <line x1="600" y1="540" x2="1140" y2="540"/>
    <line x1="600" y1="540" x2="600" y2="260"/>
  </g>
  <text x="1115" y="565" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#5eead4" fill-opacity="0.7">x</text>
  <text x="575" y="275" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#5eead4" fill-opacity="0.7">y</text>

  <!-- Scatter points -->
  <g fill="#5eead4">
    <circle cx="650" cy="510" r="5"/>
    <circle cx="690" cy="495" r="5"/>
    <circle cx="720" cy="478" r="5"/>
    <circle cx="760" cy="470" r="5"/>
    <circle cx="800" cy="450" r="5"/>
    <circle cx="830" cy="430" r="5"/>
    <circle cx="875" cy="415" r="5"/>
    <circle cx="910" cy="400" r="5"/>
    <circle cx="950" cy="385" r="5"/>
    <circle cx="985" cy="365" r="5"/>
    <circle cx="1025" cy="350" r="5"/>
    <circle cx="1065" cy="330" r="5"/>
    <circle cx="1095" cy="320" r="5"/>
  </g>
  <!-- Best fit line -->
  <line x1="615" y1="525" x2="1130" y2="295" stroke="#fb7185" stroke-width="3" stroke-linecap="round"/>

  <!-- Matrix glyph -->
  <text x="60" y="500" font-family="Georgia, serif" font-size="48" fill="#5eead4" opacity="0.55">y = Xβ + ε</text>

  <!-- Title -->
  <text x="60" y="160" font-family="Georgia, serif" font-size="64" font-weight="600" fill="#ecfdf5">Linear Models</text>
  <text x="60" y="205" font-family="Georgia, serif" font-size="22" fill="#5eead4" font-style="italic">least squares · Gauss-Markov · projection geometry</text>
</svg>

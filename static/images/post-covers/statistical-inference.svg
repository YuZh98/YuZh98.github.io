<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <linearGradient id="curveA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="curveB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Null distribution -->
  <path d="M 540 540 C 600 540 620 540 640 540 C 690 540 720 530 750 480 C 770 440 780 320 800 290 C 820 260 840 320 860 380 C 880 440 900 530 930 540 C 950 540 980 540 1050 540 Z"
        fill="url(#curveA)"/>
  <path d="M 540 540 C 600 540 620 540 640 540 C 690 540 720 530 750 480 C 770 440 780 320 800 290 C 820 260 840 320 860 380 C 880 440 900 530 930 540 C 950 540 980 540 1050 540"
        fill="none" stroke="#fb923c" stroke-width="2.5"/>

  <!-- Alternative distribution -->
  <path d="M 700 540 C 760 540 780 540 800 540 C 850 540 880 530 910 480 C 930 440 940 330 960 300 C 980 270 1000 330 1020 380 C 1040 440 1060 530 1090 540 C 1110 540 1140 540 1170 540 Z"
        fill="url(#curveB)"/>
  <path d="M 700 540 C 760 540 780 540 800 540 C 850 540 880 530 910 480 C 930 440 940 330 960 300 C 980 270 1000 330 1020 380 C 1040 440 1060 530 1090 540 C 1110 540 1140 540 1170 540"
        fill="none" stroke="#facc15" stroke-width="2.5"/>

  <!-- Threshold line -->
  <line x1="900" y1="280" x2="900" y2="540" stroke="#fda4af" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="908" y="295" font-family="Georgia, serif" font-size="20" fill="#fda4af" font-style="italic">α</text>

  <!-- Axis -->
  <line x1="540" y1="540" x2="1170" y2="540" stroke="#fed7aa" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Symbols -->
  <text x="60" y="500" font-family="Georgia, serif" font-size="44" fill="#fb923c" opacity="0.55">L(θ; x)</text>

  <!-- Title -->
  <text x="60" y="160" font-family="Georgia, serif" font-size="60" font-weight="600" fill="#fff7ed">Statistical Inference</text>
  <text x="60" y="205" font-family="Georgia, serif" font-size="22" fill="#fb923c" font-style="italic">estimation · hypothesis testing · UMVUE · sufficiency</text>
</svg>

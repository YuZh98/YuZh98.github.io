<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.7" cy="0.55" r="0.4">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Nested sigma-algebra rectangles -->
  <g transform="translate(820 315)" fill="none" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.85">
    <rect x="-220" y="-160" width="440" height="320" rx="14"/>
    <rect x="-170" y="-115" width="340" height="230" rx="12" stroke-opacity="0.6"/>
    <rect x="-115" y="-70" width="230" height="140" rx="10" stroke-opacity="0.45"/>
    <rect x="-55" y="-30" width="110" height="60" rx="8" stroke-opacity="0.3"/>
  </g>
  <text x="820" y="330" font-family="Georgia, serif" font-size="120" fill="#f5d0fe" text-anchor="middle" font-style="italic" opacity="0.9">σ</text>

  <!-- Integral motif -->
  <text x="60" y="540" font-family="Georgia, serif" font-size="160" fill="#f5d0fe" opacity="0.18">∫</text>

  <!-- Title -->
  <text x="60" y="160" font-family="Georgia, serif" font-size="60" font-weight="600" fill="#fdf4ff">Advanced Probability Theory</text>
  <text x="60" y="205" font-family="Georgia, serif" font-size="22" fill="#c084fc" font-style="italic">measure spaces · limit theorems · martingale convergence</text>
</svg>
